name: ame-admin

services:
  db:
    image: postgres:18-alpine
    container_name: db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ame_admin
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ame_admin"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:
    name: ame-admin_db
